<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TarantulApp&#8482;</title>
    <meta name="description" content="Manage your tarantula collection: profiles, reminders, terrarium QR labels, and species catalog." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" id="tarantulapp-favicon" href="/logo-neon.png?v=3" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TarantulApp&#8482;" />
    <link rel="apple-touch-icon" href="/icon-192.png?v=3" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('tarantulapp-theme')
          if (t !== 'light' && t !== 'dark') t = 'dark'
          document.documentElement.setAttribute('data-theme', t)
          var href = t === 'light' ? '/logo-black.png?v=2' : '/logo-neon.png?v=3'
          var f = document.getElementById('tarantulapp-favicon')
          if (f) f.setAttribute('href', href)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
