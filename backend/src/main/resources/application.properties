# ─── Database (Supabase / PostgreSQL) ───────────────────────────────────────
# Copia estos valores desde tu proyecto Supabase:
#   Settings → Database → Connection string → JDBC
#
# Opción A — Conexión directa (recomendada para desarrollo local):
#   jdbc:postgresql://db.<REF>.supabase.co:5432/postgres?sslmode=require
#
# Opción B — Pooler Session Mode (recomendado para producción con JPA):
#   jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
#   ⚠️  NO uses el Transaction Mode (puerto 6543) con JPA/Hibernate
#
# IMPORTANTE: NO uses Transaction Mode pooler (puerto 6543) con JPA/Hibernate
spring.datasource.url=${DB_URL:jdbc:postgresql://db.REEMPLAZA.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:REEMPLAZA_CON_TU_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# "validate" = Hibernate solo verifica el esquema; Flyway lo crea/actualiza
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Store JDBC timestamps in UTC (matches timestamptz + java.time.Instant)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── JWT ────────────────────────────────────────────────────────────────────
# IMPORTANTE: en producción usa una variable de entorno con un secreto largo y aleatorio
app.jwt.secret=${JWT_SECRET:TarantulApp-dev-secret-cambiar-en-produccion-minimo-32-chars!!}
app.jwt.expiration-ms=86400000

# ─── File Upload ────────────────────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Jackson (fechas como ISO strings, no arrays/timestamps) ────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─── CORS ───────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}

# ─── Usuario de prueba local (ver LocalDevUserSeed) ─────────────────────────
# Por defecto false. Requiere además spring.profiles.active=local (o dev) — ver .SAMPLE
# Preferido: TARANTULAPP_DEV_SEED_USER=true (menos colisión que DEV_SEED_* genérico)
app.dev-seed-user=${TARANTULAPP_DEV_SEED_USER:${DEV_SEED_USER:false}}

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Email (password reset) ─────────────────────────────────────────────────
# Configura en Railway: MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD
# Para Gmail: host=smtp.gmail.com, port=587, username=tucorreo@gmail.com
#             password=contraseña-de-aplicación (no tu contraseña normal)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:noreply@tarantulapp.com}
# URL base del frontend (para el link en el email)
app.base-url=${APP_BASE_URL:http://localhost:5173}

# ─── Cloudinary (persistent photo storage) ──────────────────────────────────
# Crea cuenta gratis en cloudinary.com → Settings → API Keys
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ─── Stripe Billing (test mode) ─────────────────────────────────────────────
# Customer Portal: return URL = app.base-url + /account (misma ruta en app web y WebView Android)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price-id-monthly=${STRIPE_PRICE_ID_MONTHLY:}
stripe.price-id-yearly=${STRIPE_PRICE_ID_YEARLY:}

# ─── Config local (gitignored + opcional fuera del repo) ─────────────────────
# 1) backend/src/main/resources/application-local.properties (por proyecto, en .gitignore)
# 2) %USERPROFILE%\.tarantulapp\tarantulapp-local.properties (misma máquina, todos los clones)
#    Útil si el repo vive en OneDrive y no quieres credenciales ahí.
# El segundo archivo, si existe, pisa al primero.
spring.config.import=optional:classpath:application-local.properties,optional:file:${user.home}/.tarantulapp/tarantulapp-local.properties
