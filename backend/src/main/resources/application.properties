# ─── Database (Supabase / PostgreSQL) ───────────────────────────────────────
# Copia estos valores desde tu proyecto Supabase:
#   Settings → Database → Connection string → JDBC
#
# Opción A — Conexión directa (recomendada para desarrollo local):
#   jdbc:postgresql://db.<REF>.supabase.co:5432/postgres?sslmode=require
#
# Opción B — Pooler Session Mode (recomendado para producción con JPA):
#   jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
#   ⚠️  NO uses el Transaction Mode (puerto 6543) con JPA/Hibernate
#
# IMPORTANTE: NO uses Transaction Mode pooler (puerto 6543) con JPA/Hibernate
spring.datasource.url=${DB_URL:jdbc:postgresql://db.REEMPLAZA.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:REEMPLAZA_CON_TU_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# "validate" = Hibernate solo verifica el esquema; Flyway lo crea/actualiza
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── JWT ────────────────────────────────────────────────────────────────────
# IMPORTANTE: en producción usa una variable de entorno con un secreto largo y aleatorio
app.jwt.secret=${JWT_SECRET:TarantulApp-dev-secret-cambiar-en-produccion-minimo-32-chars!!}
app.jwt.expiration-ms=86400000

# ─── File Upload ────────────────────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=8080
