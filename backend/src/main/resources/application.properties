# ─── Database (Supabase / PostgreSQL) ───────────────────────────────────────
# Una sola convención: las tres variables DB_URL, DB_USERNAME, DB_PASSWORD.
#
# Producción (Railway, Fly.io, etc.): define DB_* en el panel del host (no commitear secretos).
#
# Local: o bien exportas DB_* en la terminal / VS Code envFile (ver database.local.env.SAMPLE),
# o bien copias application-local.properties.SAMPLE → application-local.properties (gitignored).
# Spring solo importa ese archivo opcional; ya no se lee %USERPROFILE%\.tarantulapp\...
#
# Supabase — local / Flyway: conexión DIRECTA (Connect → Direct) evita dos límites del Session pooler:
#   • "Read timed out" a ~5 min si la URL traía socketTimeout=300
#   • FATAL MaxClientsInSessionMode: max clients reached (pool de sesiones lleno en planes Nano; migraciones fallidas u otros procesos consumen slots).
#   Direct: host db.<Reference ID>.supabase.co:5432, usuario postgres, password = Database password.
#   Pooler Session (…pooler.supabase.com:5432, usuario postgres.<ref>) en prod está bien; en local con Flyway pesado, prioriza Direct.
#   Pooler Transaction (:6543): suele requerir en DB_URL prepareThreshold=0 (desactiva prepared statements del driver)
#   para evitar errores con PgBouncer en modo transaction + Hibernate.
# Si ves "Circuit breaker open: Too many authentication errors": Supabase bloqueó intentos de login
#   por contraseña/usuario malos. Espera varios minutos sin arrancar la app y corrige la contraseña
#   en Settings → Database (no uses la anon key de la API como password JDBC).
# Si Flyway valida y luego ves "Connection is not available… timed out": pooler Supabase lento/saturado,
#   otro proceso usando la BD, o falta connectTimeout/socketTimeout en la URL JDBC (ver .SAMPLE).
# socketTimeout en la URL JDBC está en SEGUNDOS; 300 = 5 min. Migraciones largas pueden dar
#   "Read timed out" / 08006 al cumplirse ese tiempo; en local suele bastar socketTimeout=0 (sin límite).
# idle-timeout DEBE ser < max-lifetime.
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
# Timeout de lectura del socket del driver PG (segundos). 0 = sin límite. Evita "Read timed out" a los 5 min
# si DB_URL trae socketTimeout=300 y Flyway tarda (p. ej. V26 vía pooler Supabase). Override con JDBC_SOCKET_TIMEOUT_SECONDS.
spring.datasource.hikari.data-source-properties.socketTimeout=${JDBC_SOCKET_TIMEOUT_SECONDS:0}
# Pocas conexiones al arrancar = menos presión al pooler Supabase (cada slot cuenta en Session mode).
# Si MaxClientsInSessionMode: baja DB_POOL_MAX a 2 o usa conexión Direct (db.<ref>.supabase.co).
# Nunca 1: Flyway + arranque pueden necesitar más de un checkout → timeout "Connection is not available".
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:2}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:0}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:10000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:240000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:900000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_MS:120000}

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# "validate" = Hibernate solo verifica el esquema; Flyway lo crea/actualiza
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Store JDBC timestamps in UTC (matches timestamptz + java.time.Instant)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Permite usar una conexión distinta para migraciones (recomendado en prod con Supabase):
# - DB_URL puede seguir en pooler/session
# - FLYWAY_URL puede apuntar a Direct (db.<ref>.supabase.co:5432)
# Si no defines FLYWAY_*, Flyway usa los mismos valores de spring.datasource.*.
spring.flyway.url=${FLYWAY_URL:${spring.datasource.url}}
spring.flyway.user=${FLYWAY_USERNAME:${spring.datasource.username}}
spring.flyway.password=${FLYWAY_PASSWORD:${spring.datasource.password}}
spring.flyway.connect-retries=${FLYWAY_CONNECT_RETRIES:3}
spring.flyway.connect-retries-interval=${FLYWAY_CONNECT_RETRIES_INTERVAL:2}

# ─── JWT ────────────────────────────────────────────────────────────────────
# IMPORTANTE: en producción usa una variable de entorno con un secreto largo y aleatorio
app.jwt.secret=${JWT_SECRET:TarantulApp-dev-secret-cambiar-en-produccion-minimo-32-chars!!}
app.jwt.expiration-ms=86400000

# ─── File Upload ────────────────────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Jackson (fechas como ISO strings, no arrays/timestamps) ────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─── CORS ───────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,https://tarantulapp.com,https://www.tarantulapp.com}
app.auth-rate-limit-per-minute=${AUTH_RATE_LIMIT_PER_MINUTE:25}
app.auth-rate-limit.login-per-minute=${AUTH_RATE_LIMIT_LOGIN_PER_MINUTE:12}
app.auth-rate-limit.register-per-minute=${AUTH_RATE_LIMIT_REGISTER_PER_MINUTE:8}
app.auth-rate-limit.recovery-per-minute=${AUTH_RATE_LIMIT_RECOVERY_PER_MINUTE:6}
app.auth-rate-limit.oauth-per-minute=${AUTH_RATE_LIMIT_OAUTH_PER_MINUTE:20}

# Límite GET feed público de comunidad (por IP, ventana 1 min).
app.rate-limit.public-feed-per-minute=${RATE_LIMIT_PUBLIC_FEED_PER_MINUTE:90}
# Límite POST mensajes Spood (por usuario autenticado o IP; ventana 1 min).
app.rate-limit.chat-message-per-minute=${RATE_LIMIT_CHAT_MESSAGE_PER_MINUTE:40}
# POST /api/chat/threads/open (por usuario o IP; ventana 1 min).
app.rate-limit.chat-open-thread-per-minute=${RATE_LIMIT_CHAT_OPEN_THREAD_PER_MINUTE:25}
# CSV on the Java service (Railway): APP_ADMIN_EMAILS=you@host.com,other@host.com. The navbar reads admin from the API, not Vite env.
app.admin.emails=${APP_ADMIN_EMAILS:}
app.push.enabled=${APP_PUSH_ENABLED:true}
app.push.fcm-server-key=${FCM_SERVER_KEY:}
app.official-vendors.seed-on-startup=${OFFICIAL_VENDORS_SEED_ON_STARTUP:false}

# ─── Usuario de prueba local (ver LocalDevUserSeed) ─────────────────────────
# Por defecto false. Requiere además spring.profiles.active=local (o dev) — ver .SAMPLE
# Preferido: TARANTULAPP_DEV_SEED_USER=true (menos colisión que DEV_SEED_* genérico)
app.dev-seed-user=${TARANTULAPP_DEV_SEED_USER:${DEV_SEED_USER:false}}

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Email (password reset) ─────────────────────────────────────────────────
# Configura en Railway: MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD
# Para Gmail: host=smtp.gmail.com, port=587, username=tucorreo@gmail.com
#             password=contraseña-de-aplicación (no tu contraseña normal)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:noreply@tarantulapp.com}
app.mail.from-name=${MAIL_FROM_NAME:TarantulApp}
app.mail.reply-to=${MAIL_REPLY_TO:support@tarantulapp.com}
app.trial-reminder.enabled=${TRIAL_REMINDER_ENABLED:true}
app.trial-reminder.cron=${TRIAL_REMINDER_CRON:0 0 9 * * *}
# URL base del frontend (para el link en el email)
app.base-url=${APP_BASE_URL:http://localhost:5173}
app.launch-event.capacity=${LAUNCH_EVENT_CAPACITY:45}
app.launch-event.datetime-local=${LAUNCH_EVENT_DATETIME_LOCAL:2026-05-09T15:00:00}
app.launch-event.duration-minutes=${LAUNCH_EVENT_DURATION_MINUTES:120}
app.launch-event.timezone=${LAUNCH_EVENT_TIMEZONE:America/Toronto}
app.launch-event.location=${LAUNCH_EVENT_LOCATION:Montreal, Quebec}
app.launch-event.title=${LAUNCH_EVENT_TITLE:TarantulApp Live Registration Event}
app.launch-event.reminders-cron=${LAUNCH_EVENT_REMINDERS_CRON:0 0 10 * * *}

# Referidos: dias extra de trial (se suman al trial_ends_at vigente o desde ahora si ya expiro)
app.referral.referee-bonus-days=${REFERRAL_REFEREE_BONUS_DAYS:3}
app.referral.referrer-bonus-days=${REFERRAL_REFERRER_BONUS_DAYS:3}

# ─── Cloudinary (persistent photo storage) ──────────────────────────────────
# Crea cuenta gratis en cloudinary.com → Settings → API Keys
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ─── Stripe Billing (test mode) ─────────────────────────────────────────────
# Customer Portal: return URL = app.base-url + /account (misma ruta en app web y WebView Android)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price-id-monthly=${STRIPE_PRICE_ID_MONTHLY:}
stripe.price-id-yearly=${STRIPE_PRICE_ID_YEARLY:}
# One-time $2 USD (or your Stripe currency) — marketplace “listing boost” at publish time
stripe.price-id-listing-boost=${STRIPE_PRICE_ID_LISTING_BOOST:}

# ─── Google Play Billing (Android) ───────────────────────────────────────────
# Placeholder flow:
# - mode=stub accepts tokens that start with test_/sandbox_/fake_ (if allow-test-tokens=true)
# - mode=real is reserved for Android Publisher API integration
billing.google-play.enabled=${GOOGLE_PLAY_BILLING_ENABLED:false}
billing.google-play.mode=${GOOGLE_PLAY_BILLING_MODE:stub}
billing.google-play.allow-test-tokens=${GOOGLE_PLAY_BILLING_ALLOW_TEST_TOKENS:true}
billing.google-play.package-name=${GOOGLE_PLAY_PACKAGE_NAME:com.tarantulapp.app}
billing.google-play.subscription-product-id=${GOOGLE_PLAY_SUBSCRIPTION_PRODUCT_ID:tarantulapp_pro_monthly}

# ─── Sex ID LLM (texto barato + fallback a heuristicas) ─────────────────────
app.sex-id.llm.enabled=${SEX_ID_LLM_ENABLED:false}
app.sex-id.llm.api-url=${SEX_ID_LLM_API_URL:https://api.openai.com/v1/chat/completions}
app.sex-id.llm.model=${SEX_ID_LLM_MODEL:gpt-4o-mini}
app.sex-id.llm.api-key=${SEX_ID_LLM_API_KEY:}

# ─── Overrides solo en tu máquina (gitignored) ──────────────────────────────
# Si application-local.properties define spring.datasource.url, SOBRESCRIBE DB_URL del entorno.
spring.config.import=optional:classpath:application-local.properties
