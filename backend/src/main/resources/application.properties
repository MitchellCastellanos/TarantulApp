# ─── Database (SQL Server) ──────────────────────────────────────────────────
# Ajusta el host, puerto y nombre de la base de datos según tu entorno local
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TarantulApp;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# "validate" = Hibernate solo verifica el esquema; Flyway lo crea/actualiza
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false

# ─── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── JWT ────────────────────────────────────────────────────────────────────
# IMPORTANTE: en producción usa una variable de entorno con un secreto largo y aleatorio
app.jwt.secret=${JWT_SECRET:TarantulApp-dev-secret-cambiar-en-produccion-minimo-32-chars!!}
app.jwt.expiration-ms=86400000

# ─── File Upload ────────────────────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=8080
